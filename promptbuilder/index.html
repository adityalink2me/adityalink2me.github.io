<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Builder Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
padding:30px;
}

.container{
max-width:1600px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.2);
border-radius:20px;
padding:25px;
box-shadow:0 8px 30px rgba(0,0,0,.15);
}

h1{
color:white;
margin-bottom:25px;
text-align:center;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
color:white;
font-weight:600;
margin-bottom:8px;
}

select,input,textarea{
padding:12px;
border:none;
border-radius:12px;
font-size:15px;
}

textarea{
resize:none;
}

.checkbox-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.checkbox-grid label{
font-size:14px;
font-weight:500;
}

.buttons{
display:flex;
gap:12px;
margin-top:20px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.primary{
background:#4ade80;
}

.secondary{
background:#60a5fa;
}

.danger{
background:#f87171;
}

button:hover{
transform:translateY(-2px);
}

#promptOutput{
width:100%;
height:600px;
font-family:monospace;
}

.output-title{
color:white;
margin-bottom:15px;
font-size:24px;
font-weight:700;
}

@media(max-width:1000px){
.container{
grid-template-columns:1fr;
}

.form-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<h1>🚀 Prompt Builder Studio</h1>

<div class="container">

<div class="card">

<div class="form-grid">

<div class="form-group">
<label>Category</label>
<select id="category"></select>
</div>

<div class="form-group">
<label>Sub Category</label>
<select id="subcategory"></select>
</div>

<div class="form-group">
<label>Topic / Domain</label>
<select id="domain"></select>
</div>

<div class="form-group">
<label>Target Audience</label>
<select id="audience">
<option>Beginners</option>
<option>Students</option>
<option>Teachers</option>
<option>Developers</option>
<option>Researchers</option>
<option>Business Owners</option>
<option>Professionals</option>
</select>
</div>

<div class="form-group">
<label>Difficulty</label>
<select id="difficulty">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
<option>Expert</option>
<option>PhD Level</option>
</select>
</div>

<div class="form-group">
<label>AI Model</label>
<select id="model">
<option>ChatGPT</option>
<option>Claude</option>
<option>Gemini</option>
<option>NotebookLM</option>
<option>Perplexity</option>
<option>Zapier AI</option>
<option>Gamma</option>
<option>DeepSeek AI</option>
<option>Cursor</option>
<option>Lovable</option>
<option>Bolt</option>
</select>
</div>

<div class="form-group">
<label>Output Type</label>
<select id="output">
<option>HTML App</option>
<option>Prompt</option>
<option>Markdown</option>
<option>DOC</option>
<option>XLS</option>
<option>PPT</option>
<option>JSON</option>
<option>Code</option>
</select>
</div>

<div class="form-group">
<label>Tone</label>
<select id="tone">
<option>Professional</option>
<option>Academic</option>
<option>Friendly</option>
<option>Creative</option>
<option>Technical</option>
</select>
</div>

<div class="form-group">
<label>Length</label>
<select id="length">
<option>Short</option>
<option>Medium</option>
<option>Detailed</option>
<option>Comprehensive</option>
</select>
</div>

<div class="form-group">
<label>Questions / Cards</label>
<input id="count" type="number" value="10">
</div>

</div>

<br>

<label style="color:white;font-weight:700;">Features</label>

<div class="checkbox-grid">

<label><input type="checkbox" value="Responsive Design"> Responsive Design</label>
<label><input type="checkbox" value="Dark Mode"> Dark Mode</label>
<label><input type="checkbox" value="Accessibility"> Accessibility</label>
<label><input type="checkbox" value="Animations"> Animations</label>
<label><input type="checkbox" value="Gamification"> Gamification</label>
<label><input type="checkbox" value="Progress Tracking"> Progress Tracking</label>
<label><input type="checkbox" value="Confetti Effects"> Confetti Effects</label>
<label><input type="checkbox" value="Charts"> Charts</label>
<label><input type="checkbox" value="Local Storage"> Local Storage</label>
<label><input type="checkbox" value="Export Options"> Export Options</label>

</div>

<br>

<div class="form-group">
<label>Additional Requirements</label>
<textarea id="extra" rows="5"></textarea>
</div>

<div class="buttons">
<button class="primary" onclick="buildPrompt()">Build Prompt</button>
<button class="secondary" onclick="copyPrompt()">Copy Prompt</button>
<button class="danger" onclick="resetForm()">Reset</button>
</div>

</div>

<div class="card">

<div class="output-title">
Generated Prompt
</div>

<textarea id="promptOutput"></textarea>

</div>

</div>

<script>

const data = {

"Research":{
subcategories:{
"Literature Review":["AI","ML","Climate Change","Healthcare"],
"Research Proposal":["Engineering","Education","Agriculture"],
"Gap Analysis":["Computer Science","Business","Medicine"]
}
},

"UI/UX Design":{
subcategories:{
"Dashboard":["School Dashboard","Admin Dashboard","Analytics Dashboard"],
"Landing Page":["Startup","Portfolio","Agency"],
"Mobile App":["Health","Travel","Finance"]
}
},

"Web Development":{
subcategories:{
"Frontend":["HTML","CSS","JavaScript","React"],
"Backend":["Django","FastAPI","Node.js"],
"Full Stack":["MERN","Django + React"]
}
},

"Machine Learning":{
subcategories:{
"Computer Vision":["Detection","Segmentation","OCR"],
"NLP":["Chatbot","Summarization","Translation"],
"LLM":["RAG","Agents","Fine-tuning"]
}
},

"Learning Content":{
subcategories:{
"Quiz":["Science","Math","History"],
"Flashcards":["Biology","Physics","English"],
"Matching Game":["HTML","Geography","Vocabulary"]
}
},

"Business":{
subcategories:{
"Letters/Emails":["Reply letter", "Cover letter", "Offer letter", "Recommendation letter", "Resignation letter", "Sales letter", "Announcement letter", "Complain letter", "Adjustment letter", "Inquiry letter", "Interview Follow-up letter", "Commendation letter", "Apology letter", "Order letter", "Acknowledgement letter"],
"Business Plan":["Startup","IT Company","Restaurant"],
"Market Analysis":["Local Market","Global Market"],
"SWOT":["Product","Company"]
}
}

};

const category=document.getElementById('category');
const subcategory=document.getElementById('subcategory');
const domain=document.getElementById('domain');

function populateCategories(){

category.innerHTML='';

Object.keys(data).forEach(cat=>{
let opt=document.createElement('option');
opt.value=cat;
opt.textContent=cat;
category.appendChild(opt);
});

updateSubcategories();
}

function updateSubcategories(){

let selected=category.value;

subcategory.innerHTML='';

Object.keys(data[selected].subcategories).forEach(sub=>{

let opt=document.createElement('option');
opt.value=sub;
opt.textContent=sub;
subcategory.appendChild(opt);

});

updateDomains();
}

function updateDomains(){

let selectedCategory=category.value;
let selectedSub=subcategory.value;

domain.innerHTML='';

data[selectedCategory]
.subcategories[selectedSub]
.forEach(item=>{

let opt=document.createElement('option');
opt.value=item;
opt.textContent=item;
domain.appendChild(opt);

});
}

category.addEventListener('change',updateSubcategories);
subcategory.addEventListener('change',updateDomains);

function buildPrompt(){

const audience=document.getElementById('audience').value;
const difficulty=document.getElementById('difficulty').value;
const model=document.getElementById('model').value;
const output=document.getElementById('output').value;
const tone=document.getElementById('tone').value;
const length=document.getElementById('length').value;
const count=document.getElementById('count').value;
const extra=document.getElementById('extra').value;

const features=[...document.querySelectorAll('input[type=checkbox]:checked')]
.map(x=>x.value);

const prompt=
`Act as an expert ${category.value} specialist.

Create a ${output} about "${domain.value}".

Category:
${category.value}

Subcategory:
${subcategory.value}

Topic:
${domain.value}

Target Audience:
${audience}

Difficulty:
${difficulty}

Tone:
${tone}

Length:
${length}

AI Model:
${model}

Number of Items:
${count}

Features Required:
${features.join(", ")}

Additional Requirements:
${extra}

Requirements:
- Ensure accuracy.
- Follow best practices.
- Make the content engaging.
- Provide professional output.
- Optimize for ${audience}.
- Include all requested features.

Output only the final result.`;

document.getElementById('promptOutput').value=prompt;

localStorage.setItem("savedPrompt",prompt);
}

function copyPrompt(){

navigator.clipboard.writeText(
document.getElementById('promptOutput').value
);

alert("Prompt copied!");
}

function resetForm(){
document.getElementById('promptOutput').value = '';
localStorage.removeItem('savedPrompt');
location.reload();
}

populateCategories();

const saved=localStorage.getItem("savedPrompt");

if(saved){
document.getElementById('promptOutput').value=saved;
}

</script>

</footer>
</body>
</html>
